<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Veepeak BLE Discovery</title>
<style>
  body { font-family: -apple-system, monospace; background: #111; color: #0f0; padding: 16px; font-size: 14px; }
  button { font-size: 18px; padding: 12px 20px; margin-bottom: 16px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 8px; }
  .service { color: #ff0; margin-top: 16px; font-weight: bold; }
  .char { color: #0ff; margin-left: 16px; }
  .prop { color: #888; margin-left: 32px; font-size: 12px; }
  .err { color: #f55; }
  .info { color: #aaa; }
  pre { white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<h2>Veepeak ELM327 BLE Discovery</h2>
<p class="info">Tap connect, pick "VEEPEAK" from the list. This will list every GATT service/characteristic the adapter exposes so we can identify which one is the UART write/notify pair.</p>
<button id="connectBtn">Connect to Veepeak</button>
<pre id="log"></pre>

<script>
const log = (msg, cls) => {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  window.scrollTo(0, document.body.scrollHeight);
};

document.getElementById('connectBtn').addEventListener('click', async () => {
  document.getElementById('log').innerHTML = '';
  try {
    log('Requesting device... pick VEEPEAK from the list.', 'info');

    // acceptAllDevices + no service filter lets us see the raw advertisement
    // and get full GATT access regardless of which UUIDs Veepeak uses.
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '0000ffe0-0000-1000-8000-00805f9b34fb', // common HM-10 / UART-clone service
        '0000ffe1-0000-1000-8000-00805f9b34fb',
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // Nordic UART Service
        '6e400002-b5a3-f393-e0a9-e50e24dcca9e',
        '6e400003-b5a3-f393-e0a9-e50e24dcca9e',
        '0000fff0-0000-1000-8000-00805f9b34fb', // other common clone service
        '0000fff1-0000-1000-8000-00805f9b34fb',
        '0000fff2-0000-1000-8000-00805f9b34fb',
        '0000abf0-0000-1000-8000-00805f9b34fb', // ESP32 / some ELM327 clones
        '0000abf1-0000-1000-8000-00805f9b34fb',
      ]
    });

    log('Device: ' + device.name + '  (id: ' + device.id + ')', 'info');
    log('Connecting to GATT server...', 'info');

    const server = await device.gatt.connect();
    log('Connected. Enumerating services...', 'info');

    const services = await server.getPrimaryServices();
    log('Found ' + services.length + ' service(s).', 'info');

    for (const service of services) {
      log('SERVICE: ' + service.uuid, 'service');
      const chars = await service.getCharacteristics();
      for (const c of chars) {
        log('  CHAR: ' + c.uuid, 'char');
        const props = c.properties;
        const propList = [];
        if (props.read) propList.push('read');
        if (props.write) propList.push('write');
        if (props.writeWithoutResponse) propList.push('writeWithoutResponse');
        if (props.notify) propList.push('notify');
        if (props.indicate) propList.push('indicate');
        log('    properties: ' + propList.join(', '), 'prop');
      }
    }

    log('', 'info');
    log('DONE. Send me the SERVICE and CHAR lines above.', 'info');

  } catch (err) {
    log('ERROR: ' + err.message, 'err');
    console.error(err);
  }
});
</script>
</body>
</html>
