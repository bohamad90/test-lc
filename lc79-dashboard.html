<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC79 // Diagnostic Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0D0C; --bg-panel: #141715; --bg-panel-raised: #181C19;
    --ink: #F5F1E8; --ink-dim: #8C9189; --amber: #FF6A00; --amber-dim: #7A3C12;
    --confirmed: #3FA796; --confirmed-dim: #1E4F47; --muted: #5A5F5C;
    --line: #232722; --danger: #D14B3F;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--ink); font-family:'JetBrains Mono',monospace; min-height:100vh; padding:18px 14px 60px; -webkit-font-smoothing:antialiased; }
  .lf { font-family:'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:.08em; }
  header { max-width:1040px; margin:0 auto 16px; }
  .htop { display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px; margin-bottom:4px; }
  .vid { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:clamp(24px,5vw,34px); letter-spacing:.02em; line-height:1; }
  .vid .ac { color:var(--amber); }
  .vmeta { font-size:10px; color:var(--ink-dim); letter-spacing:.04em; }
  .cstat { text-align:right; font-size:11px; }
  .cdot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--muted); margin-right:6px; }
  .cdot.live { background:var(--confirmed); box-shadow:0 0 6px var(--confirmed); }
  .cdot.err { background:var(--danger); box-shadow:0 0 6px var(--danger); }
  .controls { max-width:1040px; margin:0 auto 14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  button { font-family:'Barlow Condensed',sans-serif; font-weight:600; letter-spacing:.04em; text-transform:uppercase; font-size:13px; padding:10px 16px; background:var(--bg-panel); color:var(--ink); border:1px solid var(--line); border-radius:6px; cursor:pointer; }
  button.p { border-color:var(--confirmed-dim); color:var(--confirmed); }
  button:disabled { opacity:.35; cursor:default; }
  button.d { border-color:#5a2620; color:var(--danger); }
  #sl { font-size:11px; color:var(--ink-dim); }
  .section { max-width:1040px; margin:0 auto 24px; }
  .sh { display:flex; align-items:center; gap:10px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--line); }
  .sd { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:var(--confirmed); box-shadow:0 0 8px var(--confirmed); }
  .sd.exp { background:var(--amber); box-shadow:0 0 8px var(--amber); }
  .st { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:14px; letter-spacing:.06em; text-transform:uppercase; }
  .ss { font-size:10px; color:var(--ink-dim); margin-left:auto; }
  .gg { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .gc { background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:14px; }
  .gc.exp { border-color:var(--amber-dim); }
  .gp { font-size:9px; color:var(--ink-dim); letter-spacing:.08em; margin-bottom:2px; }
  .gp .c { color:var(--confirmed); }
  .gc.exp .gp .c { color:var(--amber); }
  .gn { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--ink); margin-bottom:10px; min-height:28px; }
  .gr { display:flex; align-items:baseline; gap:5px; }
  .gv { font-size:28px; font-weight:700; line-height:1; font-variant-numeric:tabular-nums; }
  .gv.stale { color:var(--muted); }
  .gu { font-size:12px; color:var(--ink-dim); }
  #tp { max-width:1040px; margin:0 auto 20px; background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:14px; display:none; }
  #tr { font-size:11px; max-height:260px; overflow-y:auto; }
  @media(max-width:480px){ .gg{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<header>
  <div class="htop">
    <div>
      <div class="vid">LC79 <span class="ac">DIAG</span></div>
      <div class="vmeta">2024 LAND CRUISER 79 &middot; 1GR-FE V6 &middot; A/T 6-SPD &middot; VEEPEAK OBDCHECK BLE</div>
    </div>
    <div class="cstat"><span class="cdot" id="cd"></span><span id="ct">Not connected</span></div>
  </div>
</header>

<div class="controls">
  <button id="connectBtn" class="p">Connect</button>
  <button id="startBtn" class="p" disabled>Start Live</button>
  <button id="stopBtn" disabled>Stop</button>
  <button id="testBtn" class="p" disabled>Self-Test</button>
  <button id="resetBtn" class="d">Force Reset</button>
  <span id="sl"></span>
</div>

<div id="tp">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div class="lf" style="font-size:13px;font-weight:600;">Self-Test Results</div>
    <div id="ts" style="font-size:11px;color:var(--ink-dim);"></div>
  </div>
  <div id="tr"></div>
</div>

<div id="grid-engine" class="section"></div>
<div id="grid-trans" class="section"></div>
<div id="grid-emissions" class="section"></div>
<div id="grid-throttle" class="section"></div>
<div id="grid-system" class="section"></div>
<div id="grid-experimental" class="section"></div>

<script>
const SVC  = '0000fff0-0000-1000-8000-00805f9b34fb';
const N_CH = '0000fff1-0000-1000-8000-00805f9b34fb';
const W_CH = '0000fff2-0000-1000-8000-00805f9b34fb';

let device, server, wChar, nChar;
let rxBuf = '', resolveFn = null, looping = false;

const $ = id => document.getElementById(id);
const setConn = (t,c) => { $('ct').textContent=t; $('cd').className='cdot '+(c||''); };
const setSL = t => $('sl').textContent = t;

// ---------- BLE CORE ----------
function onNotify(evt) {
  rxBuf += new TextDecoder('ascii').decode(evt.target.value);
  if (rxBuf.includes('>')) {
    const r = rxBuf; rxBuf = '';
    if (resolveFn) { resolveFn(r); resolveFn = null; }
  }
}

function send(cmd, ms) {
  ms = ms || 5000;
  return new Promise(async (resolve, reject) => {
    rxBuf = '';
    resolveFn = resolve;
    try { await wChar.writeValue(new TextEncoder().encode(cmd + '\r')); }
    catch(e) { reject(e); return; }
    setTimeout(() => {
      if (resolveFn) { resolveFn = null; rxBuf = ''; reject(new Error('Timeout')); }
    }, ms);
  });
}

async function sendSafe(cmd) {
  try { return await send(cmd, 5000); }
  catch(e) {
    try { await wChar.writeValue(new TextEncoder().encode('\r')); } catch(e2){}
    await new Promise(r => setTimeout(r, 300));
    rxBuf = ''; resolveFn = null;
    return 'TIMEOUT';
  }
}

async function init() {
  await send('ATZ', 3000);
  await new Promise(r => setTimeout(r, 1000));
  await send('ATE0');
  await send('ATL0');
  await send('ATH1');
  await send('ATS0');
  await send('ATSP0');
  await send('0100', 6000);
}

document.getElementById('connectBtn').addEventListener('click', async () => {
  try {
    setConn('Requesting...', '');
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true, optionalServices: [SVC]
    });
    setConn('Connecting...', '');
    server = await Promise.race([
      device.gatt.connect(),
      new Promise((_,rj) => setTimeout(() => rj(new Error('connect timeout')), 10000))
    ]);
    const svc = await server.getPrimaryService(SVC);
    wChar = await svc.getCharacteristic(W_CH);
    nChar = await svc.getCharacteristic(N_CH);
    await nChar.startNotifications();
    nChar.addEventListener('characteristicvaluechanged', onNotify);

    // Detect native OS-level disconnects and inform user cleanly
    device.addEventListener('gattserverdisconnected', () => {
      if (looping) {
        looping = false;
        setConn('Disconnected', 'err');
        setSL('BLE disconnected. Tap Connect to reconnect.');
        $('startBtn').disabled = false;
        $('stopBtn').disabled = true;
        $('connectBtn').disabled = false;
        $('testBtn').disabled = true;
      }
    });

    setSL('Initializing...');
    await init();
    setConn('Connected', 'live');
    setSL('Ready.');
    $('startBtn').disabled = false;
    $('testBtn').disabled = false;
  } catch(e) {
    setConn('Failed', 'err');
    setSL(e.message);
  }
});

// ---------- GAUGE DEFINITIONS ----------
const GAUGES = [
  // ENGINE
  {id:'rpm',   pid:'010C', name:'Engine RPM',         unit:'rpm', group:'engine',
   dec: h => Math.round(parseInt(h.substr(0,4),16)/4)},
  {id:'spd',   pid:'010D', name:'Vehicle Speed',       unit:'km/h', group:'engine',
   dec: h => parseInt(h.substr(0,2),16)},
  {id:'cool',  pid:'0105', name:'Coolant Temp',        unit:'°C', group:'engine',
   dec: h => parseInt(h.substr(0,2),16)-40},
  {id:'iat',   pid:'010F', name:'Intake Air Temp',     unit:'°C', group:'engine',
   dec: h => parseInt(h.substr(0,2),16)-40},
  {id:'aat',   pid:'0146', name:'Ambient Air Temp',    unit:'°C', group:'engine',
   dec: h => parseInt(h.substr(0,2),16)-40},
  {id:'maf',   pid:'0110', name:'MAF Air Flow',        unit:'g/s', group:'engine',
   dec: h => (parseInt(h.substr(0,4),16)/100).toFixed(2)},
  {id:'load',  pid:'0104', name:'Engine Load',         unit:'%', group:'engine',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  {id:'tim',   pid:'010E', name:'Timing Advance',      unit:'deg', group:'engine',
   dec: h => ((parseInt(h.substr(0,2),16)/2)-64).toFixed(1)},
  {id:'run',   pid:'011F', name:'Run Time',            unit:'s', group:'engine',
   dec: h => parseInt(h.substr(0,4),16)},
  // TRANSMISSION
  {id:'tpan',  pid:'2182', name:'Trans Fluid - Pan',   unit:'°C', group:'trans', m21:true,
   dec: h => { const f=(((parseInt(h.substr(0,2),16)*256+parseInt(h.substr(2,2),16))*7/100)-400)/10; return ((f-32)*5/9).toFixed(1); }},
  {id:'tcon',  pid:'2182', name:'Trans Fluid - Conv',  unit:'°C', group:'trans', m21:true,
   dec: h => { const f=(((parseInt(h.substr(4,2),16)*256+parseInt(h.substr(6,2),16))*7/100)-400)/10; return ((f-32)*5/9).toFixed(1); }},
  // EMISSIONS
  {id:'c1s1',  pid:'013C', name:'Catalyst Temp B1S1',  unit:'°C', group:'emissions',
   dec: h => (parseInt(h.substr(0,4),16)/10-40).toFixed(1)},
  {id:'c2s1',  pid:'013D', name:'Catalyst Temp B2S1',  unit:'°C', group:'emissions',
   dec: h => (parseInt(h.substr(0,4),16)/10-40).toFixed(1)},
  {id:'c1s2',  pid:'013E', name:'Catalyst Temp B1S2',  unit:'°C', group:'emissions',
   dec: h => (parseInt(h.substr(0,4),16)/10-40).toFixed(1)},
  {id:'c2s2',  pid:'013F', name:'Catalyst Temp B2S2',  unit:'°C', group:'emissions',
   dec: h => (parseInt(h.substr(0,4),16)/10-40).toFixed(1)},
  {id:'st1',   pid:'0106', name:'Short Fuel Trim B1',  unit:'%', group:'emissions',
   dec: h => ((parseInt(h.substr(0,2),16)-128)/128*100).toFixed(1)},
  {id:'lt1',   pid:'0107', name:'Long Fuel Trim B1',   unit:'%', group:'emissions',
   dec: h => ((parseInt(h.substr(0,2),16)-128)/128*100).toFixed(1)},
  {id:'st2',   pid:'0108', name:'Short Fuel Trim B2',  unit:'%', group:'emissions',
   dec: h => ((parseInt(h.substr(0,2),16)-128)/128*100).toFixed(1)},
  {id:'lt2',   pid:'0109', name:'Long Fuel Trim B2',   unit:'%', group:'emissions',
   dec: h => ((parseInt(h.substr(0,2),16)-128)/128*100).toFixed(1)},
  {id:'far',   pid:'0144', name:'Fuel/Air Equiv Ratio', unit:'', group:'emissions',
   dec: h => (parseInt(h.substr(0,4),16)/32768).toFixed(2)},
  // THROTTLE
  {id:'thr',   pid:'0111', name:'Throttle Position',   unit:'%', group:'throttle',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  {id:'rth',   pid:'0145', name:'Relative Throttle',   unit:'%', group:'throttle',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  {id:'thb',   pid:'0147', name:'Throttle Pos B',      unit:'%', group:'throttle',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  {id:'ppd',   pid:'0149', name:'Pedal Position D',    unit:'%', group:'throttle',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  {id:'ppe',   pid:'014A', name:'Pedal Position E',    unit:'%', group:'throttle',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  {id:'cta',   pid:'014C', name:'Commanded Throttle',  unit:'%', group:'throttle',
   dec: h => (parseInt(h.substr(0,2),16)/255*100).toFixed(1)},
  // SYSTEM
  {id:'vlt',   pid:'0142', name:'Module Voltage',      unit:'V', group:'system',
   dec: h => (parseInt(h.substr(0,4),16)/1000).toFixed(2)},
  {id:'baro',  pid:'0133', name:'Barometric Pressure', unit:'kPa', group:'system',
   dec: h => parseInt(h.substr(0,2),16)},
  // EXPERIMENTAL
  {id:'p2105', pid:'2105', name:'2105 - Driveshaft/Speed (raw)', unit:'', group:'experimental', m21:true,
   dec: h => parseInt(h.substr(0,4),16)},
];

const GROUPS = {
  engine:      { title:'Engine',            sub:'MODE 01',              dot:'sd' },
  trans:       { title:'Transmission',      sub:'MODE 21 · CONFIRMED',  dot:'sd' },
  emissions:   { title:'Emissions & Fuel',  sub:'MODE 01',              dot:'sd' },
  throttle:    { title:'Throttle & Pedal',  sub:'MODE 01',              dot:'sd' },
  system:      { title:'System',            sub:'MODE 01',              dot:'sd' },
  experimental:{ title:'Experimental',      sub:'FORMULA UNCONFIRMED',  dot:'sd exp' },
};

function buildUI() {
  for (const [grp, cfg] of Object.entries(GROUPS)) {
    const wrap = $('grid-' + grp);
    wrap.className = 'section';
    wrap.innerHTML =
      '<div class="sh"><div class="' + cfg.dot + '"></div>' +
      '<div class="st">' + cfg.title + '</div>' +
      '<div class="ss lf">' + cfg.sub + '</div></div>' +
      '<div class="gg" id="gg-' + grp + '"></div>';
  }
  for (const g of GAUGES) {
    const gg = $('gg-' + g.group);
    const card = document.createElement('div');
    card.className = 'gc' + (g.group === 'experimental' ? ' exp' : '');
    card.innerHTML =
      '<div class="gp">' + (g.m21 ? 'MODE 21' : 'MODE 01') +
      ' · <span class="c">' + g.pid + '</span></div>' +
      '<div class="gn">' + g.name + '</div>' +
      '<div class="gr"><span class="gv" id="gv-' + g.id + '">--</span>' +
      '<span class="gu">' + g.unit + '</span></div>';
    gg.appendChild(card);
  }
}
buildUI();

function cleanHex(raw) {
  return raw.replace(/SEARCHING\.\.\.\r?/g, '').replace(/[^0-9A-Fa-f]/g, '').toUpperCase();
}

function decode(g, raw) {
  if (raw === 'TIMEOUT') return null;
  const hex = cleanHex(raw);
  const rc = (g.m21 ? '61' : '41') + g.pid.substring(2);
  const idx = hex.indexOf(rc);
  if (idx === -1) return null;
  try { return g.dec(hex.substring(idx + 4)); } catch(e) { return null; }
}

function setGauge(g, val) {
  const el = $('gv-' + g.id);
  if (!el) return;
  if (val === null) { el.classList.add('stale'); }
  else { el.textContent = val; el.classList.remove('stale'); }
}

// ---------- LIVE READINGS ----------
async function liveLoop() {
  looping = true;
  while (looping) {
    for (const g of GAUGES) {
      if (!looping) break;
      setSL(g.pid + ' · ' + g.name);
      const raw = await sendSafe(g.pid);
      setGauge(g, decode(g, raw));
    }
  }
}

$('startBtn').addEventListener('click', async () => {
  $('startBtn').disabled = true;
  $('stopBtn').disabled = false;
  $('testBtn').disabled = true;
  $('connectBtn').disabled = true;
  // Wake the link once before starting the loop
  setSL('Waking link...');
  try { await send('ATI', 3000); } catch(e) {}
  rxBuf = ''; resolveFn = null;
  setSL('Live readings active...');
  liveLoop();
});

$('stopBtn').addEventListener('click', () => {
  looping = false;
  $('startBtn').disabled = false;
  $('stopBtn').disabled = true;
  $('testBtn').disabled = false;
  $('connectBtn').disabled = false;
  setSL('Stopped.');
});

// ---------- SELF-TEST ----------
$('testBtn').addEventListener('click', async () => {
  $('testBtn').disabled = true;
  $('startBtn').disabled = true;
  $('connectBtn').disabled = true;
  $('tp').style.display = 'block';
  $('tr').innerHTML = '';
  $('ts').textContent = 'Running...';

  // Wake first
  setSL('Waking link...');
  try { await send('ATI', 3000); } catch(e) {}
  rxBuf = ''; resolveFn = null;

  const results = [];
  for (const g of GAUGES) {
    setSL('Testing ' + g.pid + ' · ' + g.name);
    const raw = await sendSafe(g.pid);
    const val = decode(g, raw);
    const status = raw === 'TIMEOUT' ? 'TIMEOUT' : (val !== null ? 'OK' : 'NO-MATCH');
    if (status === 'OK') setGauge(g, val);
    results.push({ g, status, val, raw });
  }

  results.sort((a,b) => ({TIMEOUT:0,'NO-MATCH':1,OK:2}[a.status] - ({TIMEOUT:0,'NO-MATCH':1,OK:2}[b.status])));
  const okN = results.filter(r => r.status === 'OK').length;
  $('ts').textContent = okN + ' / ' + results.length + ' responded';

  $('tr').innerHTML = '<table style="width:100%;border-collapse:collapse;">' +
    '<thead><tr style="color:var(--ink-dim);text-align:left;">' +
    '<th style="padding:4px;">Status</th><th style="padding:4px;">PID</th>' +
    '<th style="padding:4px;">Name</th><th style="padding:4px;">Value</th></tr></thead><tbody>' +
    results.map(r => {
      const col = r.status==='OK' ? 'var(--confirmed)' : r.status==='TIMEOUT' ? 'var(--danger)' : 'var(--amber)';
      const dispVal = r.status === 'OK' ? r.val : (r.status === 'TIMEOUT' ? '(no response)' : '(no match)');
      return '<tr style="border-bottom:1px solid var(--line);">' +
        '<td style="padding:4px;color:'+col+';font-weight:600;">'+r.status+'</td>' +
        '<td style="padding:4px;color:var(--ink-dim);">'+r.g.pid+'</td>' +
        '<td style="padding:4px;">'+r.g.name+'</td>' +
        '<td style="padding:4px;color:var(--ink-dim);">'+dispVal+'</td></tr>';
    }).join('') + '</tbody></table>';

  setSL('Self-test complete: ' + okN + '/' + results.length + ' OK.');
  $('testBtn').disabled = false;
  $('startBtn').disabled = false;
  $('connectBtn').disabled = false;
});

// ---------- RESET ----------
$('resetBtn').addEventListener('click', () => {
  looping = false;
  rxBuf = ''; resolveFn = null;
  $('startBtn').disabled = false;
  $('stopBtn').disabled = true;
  $('testBtn').disabled = false;
  $('connectBtn').disabled = false;
  setSL('Reset.');
});
</script>
</body>
</html>
