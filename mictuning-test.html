<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MICTUNING Panel Protocol Test</title>
<style>
  :root { --bg: #111; --card: #1b1b1f; --accent: #3b82f6; --on: #22c55e; --off: #4b5563; }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: #f4f4f5; font-family: -apple-system, system-ui, sans-serif;
    margin: 0; padding: 24px; min-height: 100vh;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #9ca3af; font-size: 13px; margin-bottom: 20px; }
  button {
    font-size: 16px; padding: 12px 18px; border-radius: 10px; border: none;
    background: var(--accent); color: white; cursor: pointer; font-weight: 600;
  }
  button:disabled { background: #374151; color: #6b7280; }
  #connectBtn { width: 100%; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
  .channel {
    background: var(--card); border-radius: 14px; padding: 16px; text-align: center;
    border: 2px solid var(--off); transition: border-color 0.15s;
  }
  .channel.on { border-color: var(--on); }
  .channel .label { font-size: 13px; color: #9ca3af; margin-bottom: 8px; }
  .channel button { width: 100%; background: var(--off); }
  .channel.on button { background: var(--on); }
  .log {
    background: var(--card); border-radius: 10px; padding: 14px; font-family: monospace;
    font-size: 12px; color: #a1a1aa; height: 220px; overflow-y: auto; white-space: pre-wrap;
  }
  .status-bar { font-size: 13px; color: #9ca3af; margin-bottom: 12px; }
</style>
</head>
<body>

<h1>MICTUNING Panel Protocol Test</h1>
<div class="sub">Standalone test page. Open this in Bluefy on iPad/iPhone, or Chrome on desktop/Android.</div>

<button id="connectBtn">Connect to Panel</button>
<div class="status-bar" id="statusBar">Not connected.</div>

<div class="grid" id="channelGrid"></div>

<div style="margin-bottom: 12px;">
  <button id="allOnBtn" disabled>All On</button>
  <button id="allOffBtn" disabled>All Off</button>
  <button id="queryBtn" disabled>Query Status</button>
</div>

<div class="log" id="log"></div>

<script src="mictuning-ble.js"></script>
<script>
  var CHANNEL_COUNT = 12; // P1S 12-gang panel
  var panel = new MictuningPanel();
  var channelState = new Array(CHANNEL_COUNT).fill(false);

  var grid = document.getElementById('channelGrid');
  var logEl = document.getElementById('log');
  var statusBar = document.getElementById('statusBar');
  var connectBtn = document.getElementById('connectBtn');
  var allOnBtn = document.getElementById('allOnBtn');
  var allOffBtn = document.getElementById('allOffBtn');
  var queryBtn = document.getElementById('queryBtn');

  window.addEventListener('error', function (event) {
    var msg = '[GLOBAL ERROR] ' + event.message + ' at ' + event.filename + ':' + event.lineno;
    try { log(msg); } catch (e) {}
  });

  window.addEventListener('unhandledrejection', function (event) {
    var reasonMsg = (event.reason && event.reason.message) ? event.reason.message : event.reason;
    try { log('[UNHANDLED PROMISE REJECTION] ' + reasonMsg); } catch (e) {}
  });

  function log(msg) {
    var time = new Date().toLocaleTimeString();
    logEl.textContent += '[' + time + '] ' + msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function buildGrid() {
    grid.innerHTML = '';
    for (var i = 0; i < CHANNEL_COUNT; i++) {
      var div = document.createElement('div');
      div.className = 'channel';
      div.id = 'ch-' + i;
      div.innerHTML = '<div class="label">Channel ' + (i + 1) + '</div><button data-idx="' + i + '">Toggle</button>';
      grid.appendChild(div);
    }
    var buttons = grid.querySelectorAll('button');
    buttons.forEach(function (btn) {
      btn.addEventListener('click', async function () {
        var idx = parseInt(btn.dataset.idx, 10);
        var newState = !channelState[idx];
        btn.disabled = true;
        try {
          await panel.setChannel(idx, newState);
          channelState[idx] = newState;
          document.getElementById('ch-' + idx).classList.toggle('on', newState);
          log('Channel ' + (idx + 1) + ' -> ' + (newState ? 'ON' : 'OFF'));
        } catch (err) {
          log('ERROR toggling channel ' + (idx + 1) + ': ' + err.message);
        }
        btn.disabled = false;
      });
    });
  }

  connectBtn.addEventListener('click', async function () {
    try {
      connectBtn.disabled = true;
      connectBtn.textContent = 'Connecting...';
      var name = await panel.connect();
      statusBar.textContent = 'Connected: ' + name;
      connectBtn.textContent = 'Connected: ' + name;
      [allOnBtn, allOffBtn, queryBtn].forEach(function (b) { b.disabled = false; });
      log('Connected to ' + name);
    } catch (err) {
      log('Connection failed: ' + err.message);
      statusBar.textContent = 'Connection failed - see log.';
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect to Panel';
    }
  });

  allOnBtn.addEventListener('click', async function () {
    try {
      await panel.setAll(true);
      for (var i = 0; i < CHANNEL_COUNT; i++) {
        channelState[i] = true;
        document.getElementById('ch-' + i).classList.add('on');
      }
      log('All channels -> ON');
    } catch (err) {
      log('ERROR (All On): ' + err.message);
    }
  });

  allOffBtn.addEventListener('click', async function () {
    try {
      await panel.setAll(false);
      for (var i = 0; i < CHANNEL_COUNT; i++) {
        channelState[i] = false;
        document.getElementById('ch-' + i).classList.remove('on');
      }
      log('All channels -> OFF');
    } catch (err) {
      log('ERROR (All Off): ' + err.message);
    }
  });

  queryBtn.addEventListener('click', async function () {
    try {
      await panel.requestStatus();
      log('Status query sent.');
    } catch (err) {
      log('ERROR (Query Status): ' + err.message);
    }
  });

  panel.onConnectionChange(function (state) {
    if (!state.connected) {
      statusBar.textContent = 'Disconnected.';
      connectBtn.textContent = 'Connect to Panel';
      connectBtn.disabled = false;
      [allOnBtn, allOffBtn, queryBtn].forEach(function (b) { b.disabled = true; });
      log('Disconnected. Will retry automatically.');
    }
  });

  panel.onStatus(function (status) {
    if (!status.connected) {
      statusBar.textContent = 'Disconnected.';
      log('Panel disconnected.');
      return;
    }
    log('Status notify - raw hex: ' + status.raw + ' | panelOn: ' + status.panelOn + ' | channels: ' + JSON.stringify(status.channels));
  });

  buildGrid();
</script>

</body>
</html>
